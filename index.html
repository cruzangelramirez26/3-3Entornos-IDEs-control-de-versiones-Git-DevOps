<!DOCTYPE html>
<html lang="es">
<head>

<title>Sesión 16 — Entornos de Desarrollo · EGEL Plus</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--card2:#f0f2f6;--border:#dde1ea;
  --text:#374151;--text2:#6b7280;--white:#111827;
  --green:#16a34a;--green2:#15803d;--greenBg:rgba(22,163,74,.08);
  --red:#dc2626;--red2:#b91c1c;--redBg:rgba(220,38,38,.08);
  --blue:#2563eb;--blueBg:rgba(37,99,235,.08);
  --amber:#d97706;--amberBg:rgba(217,119,6,.1);
  --purple:#7c3aed;--purpleBg:rgba(124,58,237,.08);
  --teal:#0d9488;--tealBg:rgba(13,148,136,.08);
  --orange:#ea580c;--orangeBg:rgba(234,88,12,.08);
  --pink:#db2777;--pinkBg:rgba(219,39,119,.08);
  --nav-bg:rgba(244,246,249,.97);
  --opt-hover:#f8fffe;--scrollbar:#c9d0dc;--track:#e5e7eb;
  --row-hover:rgba(0,0,0,.02);
}
body.dark{
  --bg:#0a0c10;--card:#12151e;--card2:#181c28;--border:#1e2436;
  --text:#c8cdd8;--text2:#7c8494;--white:#e8ecf4;
  --green:#22c55e;--green2:#15803d;--greenBg:rgba(34,197,94,.08);
  --red:#ef4444;--red2:#b91c1c;--redBg:rgba(239,68,68,.08);
  --blue:#3b82f6;--blueBg:rgba(59,130,246,.08);
  --amber:#f59e0b;--amberBg:rgba(245,158,11,.08);
  --purple:#a78bfa;--purpleBg:rgba(167,139,250,.08);
  --teal:#14b8a6;--tealBg:rgba(20,184,166,.08);
  --orange:#f97316;--orangeBg:rgba(249,115,22,.08);
  --pink:#ec4899;--pinkBg:rgba(236,72,153,.08);
  --nav-bg:rgba(10,12,16,.95);
  --opt-hover:#1a1f30;--scrollbar:#2a3040;--track:#1a1f2e;
  --row-hover:rgba(255,255,255,.015);
}
body.dark .hdr{background:linear-gradient(135deg,#111422,#141e2e 50%,#121a2a);}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.7;min-height:100vh}
::selection{background:var(--teal);color:#fff}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
.topnav{background:var(--nav-bg);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.nav-brand{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--teal);text-transform:uppercase}
.nav-tabs{display:flex;gap:4px}
.ntab{padding:7px 14px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.ntab.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.ntab:hover:not(.active){background:var(--card2);border-color:var(--border);color:var(--white)}
.shell{max-width:920px;margin:0 auto;padding:20px 14px 80px}
.hdr{background:linear-gradient(135deg,#e8f4f2,#dff0f8 50%,#e4eeff);border:1px solid var(--border);transition:background .3s;border-radius:16px;padding:26px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(13,148,136,.07),transparent 70%);pointer-events:none}
.hdr .tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2.5px;color:var(--text2);margin-bottom:6px;text-transform:uppercase}
.hdr h1{font-size:20px;font-weight:700;color:var(--white);margin-bottom:4px}
.hdr p{font-size:12.5px;color:var(--text2)}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp .3s ease both}
.btn{padding:10px 20px;border-radius:9px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:#0f766e}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--teal);color:var(--white)}
.node{border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.node-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .2s}
.node-head:hover{background:var(--row-hover)}
.node-icon{font-size:18px;min-width:28px;text-align:center}
.node-title{font-size:15px;font-weight:700;color:var(--white)}
.node-sub{font-size:11px;color:var(--text2);margin-top:2px}
.node-arrow{font-size:11px;color:var(--text2);margin-left:auto;transition:transform .25s}
.node.open .node-arrow{transform:rotate(90deg)}
.node-body{display:none;padding:0 18px 16px}
.node.open .node-body{display:block;animation:fadeUp .2s ease both}
.node.ide .node-head{background:rgba(37,99,235,.05)}.node.ide{border-color:rgba(37,99,235,.25)}.node.ide .node-title{color:#1d4ed8}
.node.git .node-head{background:rgba(234,88,12,.05)}.node.git{border-color:rgba(234,88,12,.25)}.node.git .node-title{color:#c2410c}
.node.build .node-head{background:rgba(124,58,237,.05)}.node.build{border-color:rgba(124,58,237,.25)}.node.build .node-title{color:#6d28d9}
.node.test .node-head{background:rgba(22,163,74,.05)}.node.test{border-color:rgba(22,163,74,.25)}.node.test .node-title{color:#15803d}
.node.cicd .node-head{background:rgba(13,148,136,.05)}.node.cicd{border-color:rgba(13,148,136,.25)}.node.cicd .node-title{color:#0f766e}
.node.docker .node-head{background:rgba(219,39,119,.05)}.node.docker{border-color:rgba(219,39,119,.25)}.node.docker .node-title{color:#be185d}
.node.lint .node-head{background:rgba(217,119,6,.05)}.node.lint{border-color:rgba(217,119,6,.25)}.node.lint .node-title{color:#b45309}
.child{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;margin-top:6px;cursor:pointer;overflow:hidden;transition:all .2s}
.child:hover{border-color:var(--teal)}
.child-head{display:flex;align-items:center;gap:8px}
.child-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.child-name{font-size:13px;font-weight:600;color:var(--white)}
.child-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);margin-left:auto;padding-right:4px}
.child-arrow{font-size:11px;color:var(--text2);transition:transform .2s}
.child.open .child-arrow{transform:rotate(90deg)}
.child-body{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text);line-height:1.75}
.child.open .child-body{display:block}
.child-body strong{color:var(--white)}
.tip{background:var(--amberBg);border:1px solid rgba(217,119,6,.2);border-radius:7px;padding:9px 12px;margin-top:8px;font-size:12px}
.tip strong{color:var(--amber)}
.ex{background:var(--tealBg);border:1px solid rgba(13,148,136,.2);border-radius:7px;padding:9px 12px;margin-top:6px;font-size:12px}
.ex strong{color:var(--teal)}
.code{background:#1e2433;border-radius:7px;padding:10px 14px;margin-top:8px;font-family:'DM Mono',monospace;font-size:11.5px;color:#c8d3e8;line-height:1.7;overflow-x:auto}
.code .c{color:#6b7a99}.code .k{color:#7dd3fc}.code .s{color:#86efac}.code .f{color:#fbbf24}.code .n{color:#e2e8f0}
.vs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.vs-box{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;font-size:12px}
.vs-box h4{font-size:11px;font-weight:700;margin-bottom:4px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.d-conn{display:flex;align-items:center;gap:8px;padding:2px 22px;margin:4px 0}
.d-conn-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.d-conn-txt{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2)}
@media(max-width:560px){.vs-grid{grid-template-columns:1fr}}
.comp-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.ctab{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.ctab.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.ctab:hover:not(.active){border-color:var(--teal);color:var(--white)}
.comp-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;animation:fadeUp .3s ease both}
.comp-wrap table{width:100%;border-collapse:collapse}
.comp-wrap th{background:var(--card2);padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--white);border-bottom:1px solid var(--border)}
.comp-wrap th:first-child{width:22%;font-family:'DM Mono',monospace;font-size:10.5px;color:var(--text2)}
.comp-wrap td{padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;line-height:1.6}
.comp-wrap tr:last-child td{border-bottom:none}
.comp-wrap td:first-child{font-weight:600;color:var(--teal);font-size:12px}
.comp-wrap tr:hover td{background:var(--row-hover)}
.flash-wrap{max-width:600px;margin:0 auto}
.flash-progress{display:flex;gap:3px;margin-bottom:16px;flex-wrap:wrap}
.fp-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s}
.fp-dot.done{background:var(--teal)}.fp-dot.cur{background:var(--amber)}
.flash-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;text-align:center}
.flash-card:hover{border-color:var(--teal);transform:translateY(-2px)}
.flash-card::after{content:'TAP para voltear';position:absolute;bottom:12px;right:16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:1px}
.flash-cat{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;margin-bottom:8px;display:inline-block}
.flash-emoji{font-size:30px;margin-bottom:10px}
.flash-q{font-size:15px;font-weight:600;color:var(--white);line-height:1.55}
.flash-ans{animation:fadeUp .25s ease}
.flash-ans .ans-title{font-size:16px;font-weight:700;color:var(--teal);margin-bottom:8px}
.flash-ans .ans-body{font-size:12.5px;color:var(--text);line-height:1.7}
.flash-ans .ans-key{font-family:'DM Mono',monospace;font-size:11px;color:var(--amber);margin-top:8px}
.flash-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.flash-ctr{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)}
.flash-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.ff-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11.5px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.ff-btn.active{border-color:var(--teal);color:var(--teal);background:var(--tealBg)}
.pbar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.pbar .track{flex:1;height:6px;background:var(--track);border-radius:3px;overflow:hidden}
.pbar .fill{height:100%;background:linear-gradient(90deg,var(--teal),#2563eb);border-radius:3px;transition:width .4s ease}
.pbar .label{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);white-space:nowrap}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:14px;animation:fadeUp .35s ease both}
.qnum{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1.5px;color:var(--teal);margin-bottom:8px}
.qtxt{font-size:14px;color:var(--white);font-weight:500;line-height:1.75;margin-bottom:8px;white-space:pre-line}
.qcode{background:#1e2433;border-radius:8px;padding:12px 16px;margin-bottom:12px;font-family:'DM Mono',monospace;font-size:12px;color:#c8d3e8;line-height:1.7;overflow-x:auto;white-space:pre}
.qtag{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:5px;margin-bottom:12px;text-transform:uppercase}
.qtag.ide{background:var(--blueBg);color:#1d4ed8}
.qtag.git{background:var(--orangeBg);color:#c2410c}
.qtag.build{background:var(--purpleBg);color:#6d28d9}
.qtag.test{background:var(--greenBg);color:#15803d}
.qtag.cicd{background:var(--tealBg);color:#0f766e}
.qtag.docker{background:var(--pinkBg);color:#be185d}
.qtag.lint{background:var(--amberBg);color:#b45309}
.opts{display:grid;gap:8px}
.opt{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:13px;color:var(--text);cursor:pointer;transition:all .2s;text-align:left;font-family:'DM Sans',sans-serif;line-height:1.6;display:flex;align-items:flex-start;gap:10px}
.opt:hover:not(.locked){border-color:var(--teal);background:var(--opt-hover)}
.opt .letter{font-family:'DM Mono',monospace;font-weight:600;font-size:13px;color:var(--text2);min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(128,128,128,.1);flex-shrink:0;margin-top:1px}
.opt.correct{border-color:var(--green2);background:var(--greenBg)}.opt.correct .letter{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red2);background:var(--redBg)}.opt.wrong .letter{background:var(--red);color:#fff}
.opt.locked{cursor:default;opacity:.7}.opt.correct.locked{opacity:1}.opt.dimmed{opacity:.45}
.fb{margin-top:14px;padding:16px;border-radius:10px;animation:fadeUp .3s ease both;font-size:13px;line-height:1.75}
.fb.ok{background:var(--greenBg);border:1px solid rgba(22,163,74,.2)}.fb.ok .fb-tag{color:var(--green)}
.fb.no{background:var(--redBg);border:1px solid rgba(220,38,38,.2)}.fb.no .fb-tag{color:var(--red)}
.fb-tag{font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:'DM Mono',monospace}
.fb-text{color:var(--text)}
.fb-trap{margin-top:10px;padding:10px 12px;background:var(--amberBg);border:1px solid rgba(217,119,6,.2);border-radius:8px}
.fb-trap .trap-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--amber);font-weight:600;margin-bottom:4px}
.fb-trap p{font-size:12px;color:var(--text);line-height:1.6}
.nav{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.results{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;animation:fadeUp .4s ease both}
.results h2{font-size:20px;color:var(--white);margin-bottom:16px}
.score-big{font-family:'DM Mono',monospace;font-size:48px;font-weight:700;margin-bottom:4px}
.score-ok{color:var(--green)}.score-mid{color:var(--amber)}.score-bad{color:var(--red)}
.cat-scores{display:grid;gap:6px;margin:16px 0}
.cat-row{display:flex;align-items:center;gap:10px;font-size:13px}
.cat-row .cat-name{min-width:180px;color:var(--text2);font-size:12px}
.cat-row .cat-track{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.cat-row .cat-fill{height:100%;border-radius:3px;transition:width .6s ease}
.cat-row .cat-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:36px;text-align:right}
.qdots{display:flex;gap:4px;flex-wrap:wrap;margin-top:14px}
.qdot{width:26px;height:26px;border-radius:6px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--card2);color:var(--text2);transition:all .2s}
</style>
</head>

<script>
const MAPA = [
  {
    cls:'ide', icon:'💻', title:'IDEs — Entornos de Desarrollo Integrado',
    sub:'Herramienta central donde el ingeniero escribe, depura y ejecuta código',
    desc:'Un IDE integra en una sola herramienta todo lo necesario para desarrollar: editor, compilador, debugger, refactoring y navegación de código. Reduce el ciclo editar-compilar-depurar.',
    items:[
      { dot:'#2563eb', name:'Componentes de un IDE', tag:'Estructura',
        body:`<strong>Editor de código:</strong> resaltado de sintaxis, autocompletado (IntelliSense), detección de errores en tiempo real.<br>
<strong>Compilador/Intérprete integrado:</strong> compila y ejecuta directamente desde el IDE.<br>
<strong>Debugger:</strong> permite poner breakpoints, inspeccionar variables, ver el call stack y ejecutar paso a paso.<br>
<strong>Refactoring:</strong> renombrar símbolo en todo el proyecto, extraer método, mover clase — el IDE actualiza todas las referencias.<br>
<strong>Navegación:</strong> "ir a definición", "buscar usos", jerarquía de clases.<br>
<strong>Integración con VCS:</strong> git integrado, diff visual de cambios.
<div class="tip"><strong>⚡ EGEL:</strong> La diferencia entre un editor de texto (VSCode base) y un IDE (IntelliJ, Eclipse) es la profundidad de análisis del código: el IDE entiende la semántica, el editor solo el texto.</div>` },
      { dot:'#2563eb', name:'IDEs principales por lenguaje', tag:'Herramientas',
        body:`<strong>Java:</strong> IntelliJ IDEA (JetBrains), Eclipse, NetBeans.<br>
<strong>Python:</strong> PyCharm (JetBrains), VSCode + extensiones.<br>
<strong>C/C++:</strong> CLion, Visual Studio, Code::Blocks.<br>
<strong>Web (JS/TS):</strong> VSCode, WebStorm.<br>
<strong>Universal/Ligero:</strong> VSCode — editor extensible que se convierte en IDE con plugins.<br><br>
<strong>Ventajas de usar IDE vs editor simple:</strong> detección de errores antes de compilar, refactoring seguro, depuración integrada, productividad mayor en proyectos grandes.
<div class="ex"><strong>Analogía:</strong> Editor de texto = navaja suiza básica. IDE = taller mecánico completo con todas las herramientas especializadas.</div>` },
    ]
  },
  {
    cls:'git', icon:'🌿', title:'Control de Versiones — Git',
    sub:'Rastrear cambios, colaborar y mantener historial del código',
    desc:'Git es un sistema de control de versiones distribuido. Cada desarrollador tiene una copia completa del repositorio. Es el estándar de facto en la industria.',
    items:[
      { dot:'#ea580c', name:'Comandos fundamentales', tag:'Operaciones básicas',
        body:`<strong>git init / git clone:</strong> crear o copiar un repositorio.<br>
<strong>git add:</strong> mover cambios al área de staging (preparación).<br>
<strong>git commit:</strong> guardar un snapshot permanente con un mensaje descriptivo.<br>
<strong>git push / git pull:</strong> sincronizar con el repositorio remoto (GitHub, GitLab).<br>
<strong>git status / git log:</strong> ver estado actual e historial de commits.<br><br>
<strong>Los 3 estados de un archivo en Git:</strong><br>
• <strong>Working directory:</strong> cambios sin trackear.<br>
• <strong>Staging area (index):</strong> cambios preparados para commit.<br>
• <strong>Repository:</strong> cambios confirmados en el historial.
<div class="code"><span class="f">git add</span> <span class="n">archivo.java</span>        <span class="c"># staging</span>
<span class="f">git commit</span> <span class="k">-m</span> <span class="s">"feat: agregar login"</span>  <span class="c"># commit</span>
<span class="f">git push</span> <span class="n">origin main</span>         <span class="c"># remoto</span></div>` },
      { dot:'#ea580c', name:'Branching y Merging', tag:'Flujo de trabajo',
        body:`<strong>Branch (rama):</strong> línea paralela de desarrollo. Permite trabajar en features sin afectar main/master.<br>
<strong>Merge:</strong> integrar cambios de una rama en otra. Crea un commit de merge si hay divergencia.<br>
<strong>Rebase:</strong> reescribe el historial aplicando commits encima de otro branch. Historial más limpio pero modifica commits existentes.<br>
<strong>Pull Request / Merge Request:</strong> mecanismo para revisar código antes de integrar al branch principal. Code review.
<div class="code"><span class="f">git checkout</span> <span class="k">-b</span> <span class="n">feature/login</span>  <span class="c"># crea y cambia</span>
<span class="c"># ... trabajar ...</span>
<span class="f">git checkout</span> <span class="n">main</span>
<span class="f">git merge</span> <span class="n">feature/login</span>        <span class="c"># integra</span></div>
<div class="tip"><strong>⚡ EGEL:</strong> Merge preserva el historial completo. Rebase lo reescribe. Merge = más seguro para ramas compartidas. Rebase = historial más limpio para ramas locales.</div>` },
      { dot:'#ea580c', name:'Conflictos y resolución', tag:'Problemas comunes',
        body:`Un <strong>conflicto de merge</strong> ocurre cuando dos ramas modificaron la misma línea del mismo archivo. Git no puede decidir automáticamente cuál versión conservar.<br><br>
<strong>Git marca el conflicto así:</strong><br>
<code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</code> — tu versión<br>
<code>=======</code> — separador<br>
<code>&gt;&gt;&gt;&gt;&gt;&gt;&gt; feature/login</code> — versión entrante<br><br>
<strong>Resolución:</strong> el desarrollador edita manualmente el archivo, elige la versión correcta (o combina ambas), hace <code>git add</code> y <code>git commit</code>.
<div class="tip"><strong>⚡ EGEL:</strong> Los conflictos no son errores del sistema — son situaciones normales de colaboración. El desarrollador siempre resuelve manualmente.</div>` },
    ]
  },
  {
    cls:'build', icon:'🔨', title:'Build Tools y Gestión de Dependencias',
    sub:'Automatizar compilación, pruebas y empaquetado',
    desc:'Las build tools automatizan el proceso de convertir código fuente en artefactos ejecutables, gestionan dependencias externas y ejecutan tareas repetitivas.',
    items:[
      { dot:'#7c3aed', name:'Maven y Gradle (Java)', tag:'Ecosistema Java',
        body:`<strong>Maven:</strong> build tool de Java basado en XML (pom.xml). Define dependencias, plugins y ciclo de vida (compile → test → package → install → deploy).<br>
<strong>Gradle:</strong> más moderno, usa Groovy/Kotlin DSL (build.gradle). Más flexible y rápido que Maven gracias a compilación incremental y caché.<br><br>
<strong>Repositorio central (Maven Central):</strong> repositorio público de dependencias Java. Al declarar una dependencia, Maven/Gradle la descarga automáticamente.
<div class="code"><span class="c">&lt;!-- Maven pom.xml --&gt;</span>
<span class="k">&lt;dependency&gt;</span>
  <span class="n">&lt;groupId&gt;</span>junit<span class="n">&lt;/groupId&gt;</span>
  <span class="n">&lt;artifactId&gt;</span>junit<span class="n">&lt;/artifactId&gt;</span>
  <span class="n">&lt;version&gt;</span>4.13<span class="n">&lt;/version&gt;</span>
<span class="k">&lt;/dependency&gt;</span></div>` },
      { dot:'#7c3aed', name:'npm / pip (Node y Python)', tag:'Ecosistemas web/scripting',
        body:`<strong>npm (Node Package Manager):</strong> gestiona dependencias JavaScript/Node.js. El archivo <code>package.json</code> declara las dependencias. <code>node_modules/</code> las contiene.<br>
<strong>pip:</strong> gestor de paquetes Python. <code>requirements.txt</code> lista las dependencias. <code>pip install -r requirements.txt</code> las instala.<br><br>
<strong>Lock files:</strong> <code>package-lock.json</code> (npm) y <code>Pipfile.lock</code> (pipenv) fijan las versiones exactas de cada dependencia transitiva para reproducibilidad.
<div class="code"><span class="c"># package.json</span>
<span class="s">"dependencies"</span>: {
  <span class="s">"express"</span>: <span class="s">"^4.18.0"</span>,
  <span class="s">"axios"</span>: <span class="s">"^1.4.0"</span>
}</div>
<div class="tip"><strong>⚡ EGEL:</strong> El lock file garantiza que todos los desarrolladores y el servidor CI usen exactamente las mismas versiones. Sin él, "funciona en mi máquina" es el resultado.</div>` },
    ]
  },
  {
    cls:'test', icon:'🧪', title:'Pruebas Automatizadas',
    sub:'Verificar que el código hace lo que se supone que debe hacer',
    desc:'Las pruebas automatizadas son código que verifica otro código. Son la única forma confiable de detectar regresiones — cuando un cambio nuevo rompe funcionalidad existente.',
    items:[
      { dot:'#16a34a', name:'Pirámide de pruebas', tag:'Estrategia',
        body:`La pirámide define la proporción ideal de tipos de pruebas:<br><br>
<strong>Unitarias (base — muchas):</strong> prueban una función o clase aislada. Rápidas, deterministas, sin dependencias externas.<br>
<strong>De integración (medio — algunas):</strong> prueban la interacción entre módulos, bases de datos, APIs externas.<br>
<strong>End-to-end / UI (punta — pocas):</strong> simulan el usuario en el sistema completo. Lentas, frágiles, costosas.<br><br>
<strong>Principio:</strong> más unitarias, menos E2E. Las pruebas unitarias son baratas; las E2E son costosas en tiempo y mantenimiento.
<div class="tip"><strong>⚡ EGEL:</strong> La pirámide se invierte en proyectos mal gestionados — muchas E2E, pocas unitarias. Esto hace el suite lento y difícil de mantener.</div>` },
      { dot:'#16a34a', name:'Frameworks de prueba', tag:'Herramientas',
        body:`<strong>JUnit (Java):</strong> framework estándar para pruebas unitarias en Java. Anotaciones: @Test, @BeforeEach, @AfterEach, @Mock.<br>
<strong>pytest (Python):</strong> framework flexible. Las funciones que empiezan con test_ se detectan automáticamente.<br>
<strong>Jest (JavaScript):</strong> framework all-in-one para JS/TS. Incluye mocking, cobertura y snapshots.<br><br>
<strong>Conceptos clave:</strong><br>
• <strong>Assertion:</strong> verificación del resultado esperado vs real.<br>
• <strong>Mock/Stub:</strong> reemplaza dependencias externas (BD, API) con objetos falsos controlados.<br>
• <strong>Test coverage:</strong> porcentaje de líneas/ramas del código ejecutadas por las pruebas.
<div class="code"><span class="c">// JUnit 5 — Java</span>
<span class="k">@Test</span>
<span class="k">void</span> <span class="f">calcularTotal_conDescuento</span>() {
  <span class="k">double</span> <span class="n">resultado</span> = <span class="f">calcular</span>(100, 0.1);
  <span class="n">assertEquals</span>(90.0, <span class="n">resultado</span>);
}</div>` },
      { dot:'#16a34a', name:'TDD — Test-Driven Development', tag:'Metodología',
        body:`<strong>TDD</strong> invierte el orden: primero escribes la prueba (que falla), luego el código mínimo para que pase, luego refactorizas.<br><br>
<strong>Ciclo Red-Green-Refactor:</strong><br>
🔴 <strong>Red:</strong> escribe una prueba que falla (el código aún no existe).<br>
🟢 <strong>Green:</strong> escribe el código mínimo para que la prueba pase.<br>
🔵 <strong>Refactor:</strong> mejora el código sin romper las pruebas.<br><br>
<strong>Beneficio:</strong> el diseño emerge de los requisitos de prueba. Las pruebas documentan el comportamiento esperado.
<div class="tip"><strong>⚡ EGEL:</strong> TDD no es solo "escribir pruebas" — es usar las pruebas para GUIAR el diseño. El código solo existe para satisfacer pruebas.</div>` },
    ]
  },
  {
    cls:'cicd', icon:'🔄', title:'CI/CD — Integración y Entrega Continua',
    sub:'Automatizar el flujo desde código hasta producción',
    desc:'CI/CD automatiza la construcción, prueba y despliegue del software. Reduce el tiempo entre escribir código y tenerlo en producción, y detecta problemas temprano.',
    items:[
      { dot:'#0d9488', name:'Integración Continua (CI)', tag:'CI',
        body:`<strong>CI (Continuous Integration):</strong> cada vez que un desarrollador hace push, un servidor automáticamente compila el código y ejecuta todas las pruebas.<br><br>
<strong>Objetivo:</strong> detectar integraciones problemáticas lo antes posible. Si las pruebas fallan, el equipo lo sabe en minutos, no días.<br><br>
<strong>Regla fundamental de CI:</strong> si el build falla, arreglarlo es la máxima prioridad. No se integran nuevos cambios sobre un build roto.<br><br>
<strong>Herramientas:</strong> GitHub Actions, GitLab CI, Jenkins, CircleCI, Travis CI.
<div class="ex"><strong>Flujo CI:</strong> push → trigger → clonar repo → instalar deps → compilar → ejecutar tests → reportar resultado (verde/rojo).</div>` },
      { dot:'#0d9488', name:'Entrega y Despliegue Continuo (CD)', tag:'CD',
        body:`<strong>Continuous Delivery:</strong> el código siempre está listo para desplegarse a producción. El despliegue es manual pero el proceso está automatizado.<br>
<strong>Continuous Deployment:</strong> cada commit que pasa las pruebas se despliega automáticamente a producción sin intervención humana.<br><br>
<strong>Pipeline típico de CI/CD:</strong><br>
1. <strong>Build:</strong> compilar/empaquetar.<br>
2. <strong>Test:</strong> unitarias + integración.<br>
3. <strong>Staging:</strong> desplegar a entorno de prueba.<br>
4. <strong>E2E tests:</strong> pruebas sobre staging.<br>
5. <strong>Deploy:</strong> producción (manual en Delivery, automático en Deployment).
<div class="tip"><strong>⚡ EGEL:</strong> Delivery = listo para producción con aprobación humana. Deployment = automático a producción. Deployment implica Delivery.</div>` },
    ]
  },
  {
    cls:'docker', icon:'🐳', title:'Contenedores — Docker',
    sub:'Empaquetar aplicaciones con todas sus dependencias',
    desc:'Docker empaqueta una aplicación con su entorno completo (dependencias, configuración, runtime) en un contenedor portátil que ejecuta igual en cualquier máquina.',
    items:[
      { dot:'#db2777', name:'Conceptos fundamentales', tag:'Terminología',
        body:`<strong>Imagen:</strong> plantilla inmutable de solo lectura. Define el sistema de archivos y comandos del contenedor. Se construye a partir de un Dockerfile.<br>
<strong>Contenedor:</strong> instancia en ejecución de una imagen. Liviano, aislado, efímero. Puede destruirse y recrearse desde la misma imagen.<br>
<strong>Dockerfile:</strong> archivo de instrucciones para construir una imagen. Define la imagen base, comandos de instalación y comando de arranque.<br>
<strong>Registry:</strong> repositorio de imágenes. Docker Hub es el público. Las empresas tienen registries privados.
<div class="vs-grid">
<div class="vs-box"><h4 style="color:#db2777">Imagen</h4>Plantilla (clase). Solo lectura. Compartible. Versionada con tags.</div>
<div class="vs-box"><h4 style="color:#0d9488">Contenedor</h4>Instancia (objeto). En ejecución. Efímero. Aislado del host.</div>
</div>` },
      { dot:'#db2777', name:'Dockerfile y comandos básicos', tag:'Práctica',
        body:`<strong>Instrucciones Dockerfile:</strong><br>
<code>FROM</code> — imagen base (ubuntu, node:18, python:3.11).<br>
<code>COPY</code> — copiar archivos del host a la imagen.<br>
<code>RUN</code> — ejecutar comando durante la construcción (instalar deps).<br>
<code>EXPOSE</code> — documentar puerto que usa el contenedor.<br>
<code>CMD</code> — comando que se ejecuta al arrancar el contenedor.
<div class="code"><span class="c"># Dockerfile para app Node.js</span>
<span class="k">FROM</span> <span class="n">node:18-alpine</span>
<span class="k">WORKDIR</span> <span class="n">/app</span>
<span class="k">COPY</span> <span class="n">package*.json ./</span>
<span class="k">RUN</span> <span class="f">npm install</span>
<span class="k">COPY</span> <span class="n">. .</span>
<span class="k">EXPOSE</span> <span class="n">3000</span>
<span class="k">CMD</span> [<span class="s">"node"</span>, <span class="s">"server.js"</span>]</div>
<div class="code"><span class="f">docker build</span> <span class="k">-t</span> <span class="n">mi-app:1.0 .</span>   <span class="c"># construir imagen</span>
<span class="f">docker run</span> <span class="k">-p</span> <span class="n">3000:3000 mi-app:1.0</span> <span class="c"># ejecutar</span></div>` },
      { dot:'#db2777', name:'Contenedor vs Máquina Virtual', tag:'Comparación',
        body:`<strong>Máquina Virtual (VM):</strong> virtualiza hardware completo + SO completo. Pesada (GBs), lenta en arrancar (minutos), fuerte aislamiento.<br>
<strong>Contenedor:</strong> comparte el kernel del SO host. Liviano (MBs), arranca en segundos, aislamiento a nivel de proceso.<br><br>
<strong>El kernel compartido</strong> es la diferencia clave: los contenedores no virtualizan el hardware, solo aíslan procesos usando características del kernel Linux (namespaces, cgroups).
<div class="tip"><strong>⚡ EGEL:</strong> Contenedor ≠ VM. La pregunta típica: ¿qué hace Docker para aislar sin virtualizar hardware? Respuesta: namespaces (aislamiento de procesos) y cgroups (límite de recursos).</div>` },
    ]
  },
  {
    cls:'lint', icon:'🔍', title:'Linters y Análisis Estático',
    sub:'Detectar problemas sin ejecutar el código',
    desc:'El análisis estático examina el código fuente sin ejecutarlo para encontrar errores potenciales, violaciones de estilo y problemas de calidad.',
    items:[
      { dot:'#d97706', name:'Linters — qué detectan', tag:'Análisis estático',
        body:`Un <strong>linter</strong> analiza el código estáticamente (sin ejecutarlo) para detectar:<br><br>
<strong>Errores de estilo:</strong> indentación, naming conventions, longitud de líneas.<br>
<strong>Errores potenciales:</strong> variables no usadas, comparaciones sospechosas (= vs ==), código inalcanzable.<br>
<strong>Vulnerabilidades de seguridad:</strong> uso de funciones peligrosas, inyección SQL posible.<br>
<strong>Code smells:</strong> funciones demasiado largas, complejidad ciclomática alta.<br><br>
<strong>Herramientas por lenguaje:</strong><br>
• <strong>Java:</strong> Checkstyle, PMD, SpotBugs.<br>
• <strong>Python:</strong> flake8, pylint, mypy (tipos).<br>
• <strong>JavaScript:</strong> ESLint, JSHint.<br>
• <strong>Multi-lenguaje:</strong> SonarQube.
<div class="tip"><strong>⚡ EGEL:</strong> Linter ≠ compilador. El compilador detecta errores de sintaxis/semántica. El linter detecta malas prácticas y problemas potenciales que el compilador acepta.</div>` },
      { dot:'#d97706', name:'Integración en el flujo de trabajo', tag:'DevOps',
        body:`Los linters se integran en tres niveles:<br><br>
<strong>1. IDE en tiempo real:</strong> subraya problemas mientras escribes (plugin ESLint en VSCode).<br>
<strong>2. Pre-commit hook:</strong> se ejecuta antes de permitir un commit. Si el linter falla, el commit se rechaza localmente.<br>
<strong>3. Pipeline CI:</strong> el servidor CI ejecuta el linter en cada push. Si falla, el build se marca rojo y no se despliega.<br><br>
<strong>Complejidad ciclomática:</strong> métrica que mide el número de caminos independientes a través del código. Alta complejidad = difícil de probar y mantener.
<div class="ex"><strong>Regla práctica:</strong> linter en IDE para feedback inmediato + linter en CI como gate de calidad = código consistente en todo el equipo sin depender de la disciplina individual.</div>` },
    ]
  }
];

const QUESTIONS = [
  {cat:'git',catL:'Control de Versiones',
   q:'Un desarrollador trabaja en feature/pago-tarjeta. Mientras tanto, otro desarrollador modificó el mismo método procesarPago() en la rama main. Al intentar hacer merge, Git muestra:\n\n<<<<<<< HEAD\n    procesarPago(tarjeta, monto);\n=======\n    procesarPago(tarjeta, monto, moneda);\n>>>>>>> main\n\n¿Qué ocurre y qué debe hacer el desarrollador?',
   opts:['Editar manualmente el archivo, hacer git add y git commit','Revertir con git reset --hard al estado antes del merge','Ejecutar git merge --abort para deshacer el intento de merge','Hacer git rebase main para reaplicar los commits locales'],
   ans:0,
   exp:'Un conflicto de merge ocurre cuando dos ramas modifican la misma línea. Git no puede decidir cuál versión es correcta. El desarrollador debe editar el archivo manualmente (decidir qué código conservar), luego git add para marcar como resuelto y git commit para finalizar el merge.',
   trap:'Git rebase NO resuelve conflictos automáticamente — los mismos conflictos aparecen durante el rebase. git reset --hard descartaría el trabajo. El conflicto requiere decisión humana.'},

  {cat:'cicd',catL:'CI/CD',
   q:'Un equipo tiene este pipeline: push → compilar → pruebas unitarias → pruebas de integración → despliegue a staging → pruebas E2E → despliegue automático a producción.\n\n¿Cómo se clasifica este pipeline y qué implica esa clasificación?',
   opts:['Continuous Integration — solo automatiza la compilación y pruebas','Continuous Testing — enfocado en la cobertura de pruebas del sistema','Continuous Delivery — requiere aprobación humana antes de producción','Continuous Deployment — cada commit pasa automáticamente a producción'],
   ans:3,
   exp:'Continuous Deployment: el despliegue a producción es automático tras pasar todas las etapas. No hay intervención humana. Esto implica que las pruebas automatizadas deben ser muy confiables — un bug que pase las pruebas llega directamente a producción.',
   trap:'Continuous Delivery también automatiza todo, pero mantiene el despliegue a producción como paso manual con aprobación. La clave es "despliegue AUTOMÁTICO a producción" = Deployment, no Delivery.'},

  {cat:'docker',catL:'Docker',
   q:'Un equipo tiene una aplicación que funciona en la laptop del desarrollador pero falla en el servidor de producción con el error: "No se encuentra la versión de Node 18, se encontró Node 14".\n\nEl equipo decide usar Docker. ¿Cómo resuelve Docker este problema específico?',
   opts:['Docker virtualiza el hardware y compila Node 18 para el host','El FROM node:18 en el Dockerfile incluye esa versión en la imagen','Docker detecta el package.json e instala la versión requerida','Docker sincroniza versiones entre el host y el contenedor en runtime'],
   ans:1,
   exp:'El Dockerfile comienza con FROM node:18 (imagen base). Esta imagen ya contiene exactamente Node 18 con todas sus dependencias. El contenedor siempre ejecuta con Node 18 sin importar qué versión tenga el servidor host. "Funciona en mi máquina" se convierte en "funciona en cualquier máquina con Docker".',
   trap:'Docker no detecta automáticamente versiones ni sincroniza — el desarrollador especifica EXPLÍCITAMENTE la versión en el FROM del Dockerfile. Esa es la ventaja: reproducibilidad declarativa.'},

  {cat:'test',catL:'Testing',
   q:'Un equipo tiene 500 pruebas: 20 unitarias, 30 de integración y 450 pruebas E2E. El suite tarda 3 horas en ejecutarse. Los desarrolladores dejaron de correrlo localmente.\n\n¿Qué problema describe este escenario y cuál es la solución?',
   opts:['Falta de cobertura de código — agregar más pruebas unitarias al proyecto','Pipeline CI mal configurado — las pruebas deben ejecutarse en paralelo','Pirámide de pruebas invertida — pocas unitarias, muchas E2E lentas y frágiles','Mocking insuficiente — las pruebas de integración deberían usar mocks'],
   ans:2,
   exp:'Pirámide invertida: la base (unitarias) debería ser la mayoría por ser rápidas y baratas. Aquí la cima (E2E) domina — 450 pruebas lentas y frágiles. El resultado es un suite inutilizable que nadie corre. La solución es invertir la proporción: muchas unitarias rápidas, pocas E2E estratégicas.',
   trap:'Paralelizar ayuda pero no resuelve el problema raíz. El problema es arquitectural: demasiadas pruebas del tipo más costoso. Agregar más pruebas unitarias sin eliminar E2E duplicadas tampoco resuelve la lentitud.'},

  {cat:'git',catL:'Control de Versiones',
   q:'Un desarrollador tiene 5 commits en su rama local feature/refactor con mensajes como "fix", "fix2", "arreglando", "intento 3", "listo!". Antes de hacer el Pull Request, quiere limpiar el historial en un solo commit descriptivo.\n\n¿Qué comando/operación Git permite hacer esto de forma segura?',
   opts:['git rebase -i para reescribir el historial de la rama local','git reset --hard HEAD~5 para borrar los commits y recomenzar','git merge --squash para combinar los commits en uno antes del PR','git commit --amend para modificar el último commit del branch'],

   exp:'git rebase -i (interactive) permite combinar (squash), reordenar, editar o eliminar commits del historial de una rama LOCAL antes de compartirla. Es seguro porque la rama aún no está en el repositorio remoto compartido. --squash en merge también funciona pero no da el mismo control granular.',
   trap:'git commit --amend solo modifica el ÚLTIMO commit. git reset --hard destruiría el trabajo. La regla: rebase es seguro en ramas locales que NO han sido pusheadas a un remoto compartido.'},

  {cat:'cicd',catL:'CI/CD',
   q:'El equipo tiene GitHub Actions configurado. Un desarrollador hace push a main con un cambio que rompe 3 pruebas unitarias. El pipeline CI falla a los 2 minutos. Otros 4 desarrolladores quieren integrar sus ramas.\n\n¿Qué debe ocurrir según las mejores prácticas de CI?',
   opts:['Los demás continúan integrando porque sus cambios no causan el fallo','El responsable tiene 24 horas antes de que el equipo haga rollback','Reparar el build es prioridad máxima antes de cualquier nueva integración','El pipeline se reinicia marcando las pruebas fallidas como flaky'],
   ans:2,
   exp:'La regla fundamental de CI: un build roto bloquea al equipo. Los otros desarrolladores no deben integrar sobre código roto — acumularían cambios sobre una base inestable y los conflictos crecerían. Reparar el build inmediatamente es la máxima prioridad del equipo.',
   trap:'Que los cambios sean "independientes" no importa — integrar sobre un build roto crea una cadena de problemas difíciles de depurar. CI pierde su valor si se permite ignorar builds fallidos.'},

  {cat:'docker',catL:'Docker',
   q:'Un arquitecto evalúa si usar contenedores Docker o máquinas virtuales para un nuevo microservicio que necesita arrancar en menos de 5 segundos, consumir mínima memoria y desplegarse decenas de veces al día.\n\n¿Cuál es la elección técnica justificada?',
   opts:['Máquinas virtuales por el nivel de aislamiento de kernel que ofrecen','Contenedores Docker por arranque en segundos y despliegue frecuente','Ambos son equivalentes en peso y velocidad para microservicios','VMs en Linux y contenedores en Windows por compatibilidad de kernel'],
   ans:1,
   exp:'Los contenedores son la elección correcta para este escenario: arrancan en segundos (vs minutos de VMs), pesan MBs (vs GBs), y se crean/destruyen con mínimo overhead. Decenas de despliegues diarios son impracticables con VMs. El aislamiento de contenedores es suficiente para microservicios.',
   trap:'Las VMs ofrecen mayor aislamiento pero a un costo prohibitivo para este caso. "Mayor seguridad" no justifica minutos de arranque cuando el requisito es menos de 5 segundos. Para microservicios de alta frecuencia, los contenedores son la herramienta correcta.'},

  {cat:'test',catL:'Testing',
   q:'Un desarrollador escribe una prueba unitaria para el servicio de pagos:\n\n@Test\nvoid procesarPago_exitoso() {\n    PagoService service = new PagoService();\n    boolean resultado = service.procesar(100.0, "4111111111111111");\n    assertTrue(resultado);\n}\n\nLa prueba llama internamente a un API de Stripe (red real) y a la base de datos. ¿Cuál es el problema?',
   opts:['Falta la anotación @Mock para inyectar las dependencias externas','Los parámetros del método no son del tipo correcto para pruebas unitarias','La anotación @Test requiere que las dependencias externas estén mockeadas','La prueba depende de red real y BD real en lugar de aislar la unidad'],
   ans:3,
   exp:'Una prueba unitaria debe probar una unidad de código en AISLAMIENTO. Si llama a una API real y a la BD real, es una prueba de integración disfrazada de unitaria: lenta, no determinista (puede fallar por red), dependiente de datos externos. La solución es mockear Stripe y la BD.',
   trap:'El problema no es sintáctico ni de anotaciones — el código compila y ejecuta. El problema es conceptual: la prueba viola el principio de aislamiento de las pruebas unitarias al depender de infraestructura externa.'},

  {cat:'build',catL:'Build Tools',
   q:'El equipo trabaja en un proyecto Java. El archivo package.json declara "spring-boot": "^3.1.0". Dos desarrolladores hacen npm install en días diferentes. El primero instala 3.1.0 y el segundo instala 3.1.4 (la versión más reciente). El segundo desarrollador tiene un bug que el primero no tiene.\n\n¿Qué práctica habría prevenido este problema?',
   opts:['Migrar el proyecto a Maven para gestionar versiones de forma explícita','Versionar el package-lock.json para fijar las versiones exactas resueltas','Reemplazar el prefijo ^ por la versión exacta en el package.json','Ejecutar npm update en todos los entornos antes de cada instalación'],
   ans:1,

   trap:'Especificar la versión exacta (opción C) también funciona pero es más rígido y no maneja dependencias transitivas. El lock file es la solución estándar porque cubre toda la cadena de dependencias, no solo las directas.'},

  {cat:'lint',catL:'Análisis estático',
   q:'El equipo configura ESLint con una regla que prohíbe el uso de == (igualdad débil) y exige === (igualdad estricta) en JavaScript. El linter marca error en este código:\n\nif (userId == null) { return; }\n\nUn desarrollador argumenta que el código "funciona correctamente". ¿Quién tiene razón técnicamente y por qué?',
   opts:['El linter está mal, porque == null es un patrón válido e intencional','El desarrollador, porque el código funciona y el linter solo impone estilo','El linter detecta que == null también evalúa undefined de forma silenciosa','Ambos tienen razón según el estándar de codificación del proyecto'],
   ans:2,
   exp:'== null en JavaScript es true tanto para null como para undefined (coerción débil). El código "funciona" pero su intención no es clara: ¿se quiere verificar ambos? Si solo se quiere null, debe ser === null. El linter detecta ambigüedad semántica real, no solo estilo. Esta es la diferencia entre linter y preferencia personal.',
   trap:'No es solo preferencia — el comportamiento de == null es semánticamente ambiguo. Un linter bien configurado detecta problemas reales de comportamiento, no solo formato. "Funciona ahora" no significa "funciona como el desarrollador cree que funciona".'},

  {cat:'git',catL:'Control de Versiones',
   q:'Un equipo usa el flujo: main (producción) + develop (integración) + feature branches. Un desarrollador terminó feature/facturacion y quiere integrarla a develop. El equipo usa Pull Requests con code review obligatorio.\n\n¿Cuál es el flujo correcto?',
   opts:['Hacer merge directo de feature/facturacion a main saltando develop','Crear PR hacia develop, esperar code review y aprobación para el merge','Hacer push directo a develop sin pasar por el proceso de revisión','Hacer rebase sobre main y merge directo a producción para mayor agilidad'],
   ans:1,

   trap:'Un push directo a develop saltaría el code review obligatorio. El merge directo a main salteraría el entorno de integración (develop). Los PRs son el mecanismo de gate de calidad — saltarlos elimina el beneficio del flujo de trabajo.'},

  {cat:'docker',catL:'Docker',
   q:'Analiza este Dockerfile:\n\nFROM python:3.11\nWORKDIR /app\nCOPY . .\nRUN pip install -r requirements.txt\nCMD ["python", "app.py"]\n\n¿Cuál es el problema de rendimiento en el orden de las instrucciones?',
   opts:['FROM debe usar python:3.11-alpine para reducir el tamaño de la imagen','WORKDIR debe declararse después de COPY para que los permisos sean correctos','COPY y RUN están en orden incorrecto — pip debe ejecutarse antes del COPY','COPY . . antes de RUN pip invalida el caché aunque solo cambie el código'],

  {cat:'test',catL:'Testing',
   q:'El equipo implementa TDD para una función calcularDescuento(precio, porcentaje). El desarrollador empieza escribiendo:\n\n@Test\nvoid descuento_normal() {\n    assertEquals(90.0, calcularDescuento(100.0, 10));\n}\n\nLa prueba falla con "método no encontrado". ¿Qué debe hacer según TDD?',

   ans:2,

   trap:'Agregar más pruebas antes de implementar no es TDD — es escribir muchas pruebas sin código. TDD es ciclo corto: una prueba → mínimo código → refactor. La disciplina está en el ciclo corto, no en escribir todas las pruebas primero.'},

const nodeState = {};
const childState = {};
let activeCompara = 0;
let flashItems = [...FLASH];
let flashIdx = 0;
let flashFlipped = false;
let flashFilter = 'all';
let qIdx = 0;
let qAnswers = Array(QUESTIONS.length).fill(null);
let qLocked = Array(QUESTIONS.length).fill(false);
let quizDone = false;

function showPage(id) {
  ['mapa','compara','flash','quiz'].forEach(p => {
    document.getElementById('page-'+p).classList.toggle('hidden', p !== id);
  });
  document.querySelectorAll('.ntab').forEach((t,i) => {
    t.classList.toggle('active', ['mapa','compara','flash','quiz'][i] === id);
  });
  if (id==='compara') renderCompara();
  if (id==='flash') renderFlash();
  if (id==='quiz') renderQuiz();
  if (id==='mapa') renderMapa();
  window.scrollTo(0,0);
}

function renderMapa() {
  const pg = document.getElementById('page-mapa');
  const conn = `<div class="d-conn"><div class="d-conn-line"></div><div class="d-conn-txt">▼</div><div class="d-conn-line"></div></div>`;
  pg.innerHTML = MAPA.map((node,ni) => {
    const open = nodeState[ni] ? 'open' : '';
    const children = node.items.map((item,ci) => {
      const cop = childState[`${ni}-${ci}`] ? 'open' : '';
      return `<div class="child ${cop}" onclick="toggleChild(${ni},${ci})">
        <div class="child-head">
          <div class="child-dot" style="background:${item.dot}"></div>
          <span class="child-name">${item.name}</span>
          <span class="child-tag">${item.tag}</span>
          <span class="child-arrow">▶</span>
        </div>
        <div class="child-body">${item.body}</div>
      </div>`;
    }).join('');
    return `<div class="node ${node.cls} ${open}">
      <div class="node-head" onclick="toggleNode(${ni})">
        <span class="node-icon">${node.icon}</span>
        <div><div class="node-title">${node.title}</div><div class="node-sub">${node.sub}</div></div>
        <span class="node-arrow">▶</span>
      </div>
      <div class="node-body">
        <p style="font-size:13px;color:var(--text2);margin-bottom:10px">${node.desc}</p>
        ${children}
      </div>
    </div>`;
  }).join(conn);
}

function toggleNode(ni) { nodeState[ni]=!nodeState[ni]; renderMapa(); }
function toggleChild(ni,ci) { const k=`${ni}-${ci}`; childState[k]=!childState[k]; renderMapa(); }

function renderCompara() {
  const pg = document.getElementById('page-compara');
  const c = COMPARA[activeCompara];
  const tabs = COMPARA.map((cc,i) => `<button class="ctab ${i===activeCompara?'active':''}" onclick="setCompara(${i})">${cc.label}</button>`).join('');
  const ths = c.cols.map(h=>`<th>${h}</th>`).join('');
  const rows = c.rows.map(r=>`<tr><td>${r[0]}</td>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
  pg.innerHTML = `<div class="comp-tabs">${tabs}</div>
  <div class="comp-wrap"><table><thead><tr><th></th>${ths}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function setCompara(i) { activeCompara=i; renderCompara(); }

function getFlashItems() { return flashFilter==='all'?FLASH:FLASH.filter(f=>f.cat===flashFilter); }
function renderFlash() {
  const pg = document.getElementById('page-flash');
  flashItems = getFlashItems();
  if(flashIdx>=flashItems.length) flashIdx=0;
  const item = flashItems[flashIdx];
  const cats = [...new Set(FLASH.map(f=>f.cat))];
  const filterBtns = ['all',...cats].map(c=>`<button class="ff-btn ${flashFilter===c?'active':''}" onclick="setFlashFilter('${c}')">${c==='all'?'Todas':c}</button>`).join('');
  const dots = flashItems.map((_,i)=>`<div class="fp-dot ${i<flashIdx?'done':i===flashIdx?'cur':''}"></div>`).join('');
  const inner = flashFlipped
    ? `<div class="flash-ans"><div class="ans-title">${item.a}</div><div class="ans-body">${item.body}</div><div class="ans-key">🔑 ${item.key}</div></div>`
    : `<div><div class="flash-emoji">${item.emoji}</div><div class="flash-q">${item.q}</div></div>`;
  pg.innerHTML = `<div class="flash-filter">${filterBtns}</div>
  <div class="flash-wrap">
    <div class="flash-progress">${dots}</div>
    <span class="flash-cat" style="background:${item.bg};color:${item.color}">${item.cat}</span>
    <div class="flash-card" onclick="flipFlash()">${inner}</div>
    <div class="flash-nav">
      <button class="btn btn-ghost" ${flashIdx===0?'disabled':''} onclick="moveFlash(-1)">←</button>
      <span class="flash-ctr">${flashIdx+1} / ${flashItems.length}</span>
      <button class="btn btn-primary" onclick="moveFlash(1)">${flashIdx===flashItems.length-1?'Reiniciar':'Siguiente →'}</button>
    </div>
  </div>`;
}
function flipFlash() { flashFlipped=!flashFlipped; renderFlash(); }
function moveFlash(d) { flashFlipped=false; flashIdx=(flashIdx+d+flashItems.length)%flashItems.length; renderFlash(); }
function setFlashFilter(cat) { flashFilter=cat; flashIdx=0; flashFlipped=false; renderFlash(); }

function renderQuiz() {
  const pg = document.getElementById('page-quiz');
  if(quizDone){ pg.innerHTML=renderResults(); return; }
  const q = QUESTIONS[qIdx];
  const prog = Math.round(qIdx/QUESTIONS.length*100);
  const letters = ['A','B','C','D'];
  const parts = q.q.split('\n\n');
  let qHtml = '';
  if(parts.length >= 3) {
    const intro = parts[0];
    const code = parts.slice(1, parts.length-1).join('\n\n');
    const pregunta = parts[parts.length-1];
    qHtml = `<div class="qtxt">${intro}</div><div class="qcode">${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="qtxt">${pregunta}</div>`;
  } else if(parts.length === 2) {
    const hasCodeChars = parts[0].includes('\n') && (parts[0].includes('git ') || parts[0].includes('@') || parts[0].includes('FROM') || parts[0].includes('<<<'));
    if(hasCodeChars) {
      qHtml = `<div class="qcode">${parts[0].replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="qtxt">${parts[1]}</div>`;
    } else {
      qHtml = `<div class="qtxt">${parts[0]}</div><div class="qtxt">${parts[1]}</div>`;
    }
  } else {
    qHtml = `<div class="qtxt">${q.q}</div>`;
  }
  const opts = q.opts.map((o,i)=>{
    let cls='opt';
    if(qLocked[qIdx]){ cls+=' locked'; if(i===q.ans) cls+=' correct'; else if(i===qAnswers[qIdx]&&i!==q.ans) cls+=' wrong'; else cls+=' dimmed'; }
    return `<button class="${cls}" onclick="qAnswer(${i})"><span class="letter">${letters[i]}</span><span>${o}</span></button>`;
  }).join('');
  const fb = qLocked[qIdx] ? `<div class="fb ${qAnswers[qIdx]===q.ans?'ok':'no'}">
    <div class="fb-tag">${qAnswers[qIdx]===q.ans?'✓ CORRECTO':'✗ INCORRECTO'}</div>
    <div class="fb-text">${q.exp}</div>
    <div class="fb-trap"><div class="trap-tag">⚠ TRAMPA</div><p>${q.trap}</p></div>
  </div>` : '';
  const dots = QUESTIONS.map((_,i)=>{
    const a=qAnswers[i]; const ic=a===QUESTIONS[i].ans; const iw=a!==null&&!ic;
    const bg=i===qIdx?'var(--teal)':ic?'var(--green)':iw?'var(--red)':'var(--card2)';
    const bd=i===qIdx?'var(--teal)':ic?'var(--green2)':iw?'var(--red2)':'var(--border)';
    const col=(i===qIdx||a!==null)?'#fff':'var(--text2)';
    return `<button class="qdot" onclick="goQ(${i})" style="background:${bg};border-color:${bd};color:${col}">${i+1}</button>`;
  }).join('');
  pg.innerHTML = `<div class="pbar"><div class="label">${qIdx+1}/${QUESTIONS.length}</div><div class="track"><div class="fill" style="width:${prog}%"></div></div><div class="label">${prog}%</div></div>
  <div class="qcard">
    <div class="qnum">PREGUNTA ${qIdx+1}</div>
    <span class="qtag ${q.cat}">${q.catL}</span>
    ${qHtml}
    <div class="opts">${opts}</div>
    ${fb}
    ${qLocked[qIdx]?`<div class="nav">
      ${qIdx>0?`<button class="btn btn-ghost" onclick="goQ(${qIdx-1})">← Anterior</button>`:''}
      ${qIdx<QUESTIONS.length-1?`<button class="btn btn-primary" onclick="goQ(${qIdx+1})">Siguiente →</button>`:`<button class="btn btn-primary" onclick="finishQuiz()">Ver resultados</button>`}
    </div>`:''}
    <div class="qdots">${dots}</div>
  </div>`;
}

function qAnswer(i) { if(qLocked[qIdx]) return; qAnswers[qIdx]=i; qLocked[qIdx]=true; renderQuiz(); }
function goQ(i) { qIdx=i; renderQuiz(); window.scrollTo(0,0); }
function finishQuiz() { quizDone=true; renderQuiz(); }

function renderResults() {
  const total=QUESTIONS.length;
  const correct=qAnswers.filter((a,i)=>a===QUESTIONS[i].ans).length;
  const pct=Math.round(correct/total*100);
  const cls=pct>=80?'score-ok':pct>=60?'score-mid':'score-bad';
  const cats=[
    {id:'git',label:'Control de Versiones',color:'#ea580c'},
    {id:'cicd',label:'CI/CD',color:'#0d9488'},
    {id:'docker',label:'Docker',color:'#db2777'},
    {id:'test',label:'Testing',color:'#16a34a'},
    {id:'build',label:'Build Tools',color:'#7c3aed'},
    {id:'lint',label:'Análisis estático',color:'#d97706'},
  ];
  const catRows=cats.map(cat=>{
    const qs=QUESTIONS.filter(q=>q.cat===cat.id);
    if(!qs.length) return '';
    const c=qs.filter(q=>{ const idx=QUESTIONS.indexOf(q); return qAnswers[idx]===q.ans; }).length;
    const p=Math.round(c/qs.length*100);
    return `<div class="cat-row"><span class="cat-name">${cat.label}</span><div class="cat-track"><div class="cat-fill" style="width:${p}%;background:${cat.color}"></div></div><span class="cat-val">${c}/${qs.length}</span></div>`;
  }).join('');
  return `<div class="results"><h2>Resultado final</h2>
    <div class="score-big ${cls}">${correct}/${total}</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:16px">${pct}% · Entornos de Desarrollo</div>
    <div class="cat-scores">${catRows}</div>
    <div class="nav" style="margin-top:20px">
      <button class="btn btn-primary" onclick="resetQuiz()">🔄 Reintentar</button>
      <button class="btn btn-ghost" onclick="showPage('mapa')">🗺️ Ver mapa</button>
      <button class="btn btn-ghost" onclick="showPage('flash')">🃏 Flashcards</button>
    </div>
  </div>`;
}
function resetQuiz() { qIdx=0; qAnswers=Array(QUESTIONS.length).fill(null); qLocked=Array(QUESTIONS.length).fill(false); quizDone=false; renderQuiz(); }

function toggleTheme(){
  const dark = document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
document.addEventListener('DOMContentLoaded', ()=>{
  if(localStorage.getItem('theme')==='dark'){
    document.body.classList.add('dark');
    document.getElementById('theme-btn').textContent='☀️';
  }
  renderMapa();
});
</script>
</body>
